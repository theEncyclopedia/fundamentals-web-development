<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: auto;
      }

      .banner {
        width: 1200px;
        height: 300px;
        opacity: 1;
        position: relative;
        border-radius: 25px;
        justify-content: center;
        align-items: center;
        z-index: 10;
      }

      .container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 24px 12px;
        background-image: url("https://picsum.photos/200/300?grayscale");
        z-index: -10;
      }

      .bg-image {
        /* The image used */
        background-color: #d9d9d9;
        opacity: 0.98;
        /* Add the blur effect */
        filter: blur(20px);
        -webkit-filter: blur(20px);

        /* Full height */
        height: 100%;
        width: 100%;
        border-radius: 25px;
      }

      /* Position text in the middle of the page/image */
      .bg-text {
        font-weight: bold;
        position: absolute;
        width: 100%;
        height: 100%;
        top: 50%;
        left: 50%;
        bottom: 50%;
        transform: translate(-50%, -50%);
        z-index: 2;
        width: 80%;
        padding: 20px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="banner">
        <div class="bg-image"></div>
        <div class="bg-text">
          <div>S</div>
        </div>
      </div>
    </div>
  </body>
</html>
